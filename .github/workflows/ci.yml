name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        node-version: ["20.19", "22", "24"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run check

  react-18:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: "24"
      - run: npm ci
      - run: npm install --no-save react@18.3.1 react-dom@18.3.1 @types/react@18 @types/react-dom@18
      - run: npm run check
